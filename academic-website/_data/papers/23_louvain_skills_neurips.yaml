title: Creating Multi-Level Skill Hierarchies in Reinforcement Learning (NeurIPS 2023)
date: 2023-09-23
description: We propose a novel characterisation of a <strong>multi-level</strong> skill hierarchy for reinforcement learning. Our approach uses modularity maximisation to expose the structure of the agent's interaction with its environment at multiple levels of abstraction.
