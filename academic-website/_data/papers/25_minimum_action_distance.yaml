title: Learning The Minimum Action Distance
date: 2025-06-10
description: We propose a novel method for learning the <strong>minimum action distance</strong> in reinforcement learning. Our approach uses quasimetrics to model asymmetric distances in directed environments, leading to more accurate estimates that lead to improved performance on downstream tasks.
preprint: https://arxiv.org/abs/2506.09276
