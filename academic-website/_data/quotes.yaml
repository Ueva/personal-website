- text: "If it is worth doing, it is worth doing to completion."
  author: "Aphorisms 97"

- text: "A powerful man is not a man who dissects the universe, examining it piece by piece or measuring it with scientific precision. A powerful man has only to look upon the universe to change it."
  author: "Technomagos Gaelos"

- text: "We live on a placid island of ignorance in the midst of black seas of infinity, and it was not meant that we should voyage far."
  author: "H.P. Lovecraft"

- text: "Civilisation is like a thin layer of ice upon a deep ocean of chaos and darkness."
  author: "Werner Herzog"

- text: "I never have searched for a subject. They always just come along. They never come by way of decision-making. They just haunt me. I can't get rid of them. I did not invite them."
  author: "Werner Herzog"

- text: "Every man should pull a boat over a mountain once in his life."
  author: "Werner Herzog"

- text: "In each society there is a classification that is mirrored in another society."
  author: "Magos Tech-Auxilium Prime"

- text: "Knowledge will ever be a blessing and a curse."
  author: "Levistians, 9.22"

- text: "Such sweet music is the chatter of binary, that has no tongue to lie."
  author: "Sayings of the Archmagi, Appendix 4"

- text: "Success in creating AI would be the biggest event in human history. Unfortunately, it might also be the last."
  author: "Stephen Hawking"

- text: "The greatest enemy of knowledge is not ignorance, it is the illusion of knowledge."
  author: "Stephen Hawking"

- text: "Just as electricity transformed almost everything 100 years ago, today I actually have a hard time thinking of an industry that I don't think AI will transform in the next several years."
  author: "Andrew Ng"

- text: "The question of whether a computer can think is no more interesting than the question of whether a submarine can swim."
  author: "Edsger W. Dijkstra"

- text: "The real problem is not whether machines think but whether men do."
  author: "B.F. Skinner"

- text: "The only way of discovering the limits of the possible is to venture a little way past them into the impossible."
  author: "Arthur C. Clarke"

- text: "To understand recursion, one must first understand recursion."
  author: "Ancient Programmer Proverb"

- text: "Every problem is a gift. Without problems we would not grow."
  author: "Anthony Robbins"

- text: "Complex systems that work are invariably found to have evolved from simple systems that worked."
  author: "John Gall"

- text: "For the things we have to learn before we can do them, we learn by doing them."
  author: "Aristotle"

- text: "The more you know, the more you realise you don't know."
  author: "Aristotle"

- text: "The only way to learn a new programming language is by writing programs in it."
  author: "Dennis Ritchie"

# - text: "Choose the right tool for the job. Java is not always the answer, but occasionally is."
# author: "Russell Bradford"

- text: "AI will not replace jobs, but it will change the nature of work."
  author: "Kai-Fu Lee"

- text: "Forget artificial intelligence. In the brave new world of big data, it's artificial idiocy we should be looking out for."
  author: "Tom Chatfield"

- text: "We humans are not the end of evolution, so if we can make a machine that's as smart as a person, we can probably also make one that's much smarter. There's no point in making just another person. You want to make one that can do things we can't."
  author: "Markin Minsky"

- text: "Sometimes a problem will seem completely insurmountable. Then someone comes up with a simple new idea, or just a rearrangement of old ideas, that completely eliminates it."
  author: "Marvin Minsky"

- text: "We should forget about small efficiencies, say about 97% of the time: premature optimization is the root of all evil. Yet we should not pass up our opportunities in that critical 3%."
  author: "Donald Knuth"

- text: "We should continually be striving to transform every art into a science: in the process, we advance the art."
  author: "Donald Knuth"

- text: "The psychological profiling [of a programmer] is mostly the ability to shift levels of abstraction, from low level to high level. To see something in the small and to see something in the large."
  author: "Donald Knuth"

- text: "If you find that you're spending almost all your time on theory, start turning some attention to practical things; it will improve your theories."
  author: "Donald Knuth"

- text: "If you find that you're spending almost all your time on practice, start turning some attention to theoretical things; it will improve your practice."
  author: "Donald Knuth"

- text: "People who are more than casually interested in computers should have at least some idea of what the underlying hardware is like. Otherwise the programs they write will be pretty weird."
  author: "Donald Knuth"

- text: "Computer programming is an art, because it applies accumulated knowledge to the world, it requires skill and ingenuity, and, especially, it produces objects of beauty. A programmer who subconsciously views himself as an artist will enjoy what he does and will do it better."
  author: "Donald Knuth"

- text: "People worry that computers will get too smart and take over the world, but the real problem is that they're too foolish and they've already taken over the world."
  author: "Pedro Domingos"

- text: "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth."
  author: "Marcus Aurelius"

- text: "The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane."
  author: "Marcus Aurelius"

- text: "Look back over the past, with its changing empires that rose and fell, and you can foresee the future, too."
  author: "Marcus Aurelius"

- text: "Any sufficiently advanced technology is indistinguishable from magic."
  author: "Arthur C. Clarke"

- text: "An expert is someone who knows some of the worst mistakes that can be made in their subject, and how to avoid them."
  author: "Werner Heisenberg"

- text: "Beware of finding what you're looking for."
  author: "Richard Hamming"

- text: "In science if you know what you are doing you should not be doing it. In engineering if you do not know what you are doing you should not be doing it."
  author: "Richard Hamming"

- text: "If you don't work on important problems, it's not likely that you'll do important work."
  author: "Richard Hamming"

- text: "The purpose of computation is insight, not numbers."
  author: "Richard Hamming"

- text: "Man suffers only because he takes seriously what the gods made for fun."
  author: "Alan Watts"

- text: "Wonder is the beginning of wisdom."
  author: "Socrates"

- text: "The only true wisdom is in knowing you know nothing."
  author: "Socrates"

- text: "Education is the kindling of a flame, not the filling of a vessel."
  author: "Socrates"

- text: "You can't become a decent horseman until you fall off and get up again, a good number of times."
  author: "Bear Grylls"

- text: "Many people find it hard to understand what it is about a mountain that draws men and women to risk their lives on her freezing, icy faces - all for a chance at that single, solitary moment on the top."
  author: "Bear Grylls"

- text: "The difference between ordinary and extra-ordinary is so often just simply that little word: extra."
  author: "Bear Grylls"

- text: "No man ever wetted clay and then left it, as if there would be bricks by chance and fortune."
  author: "Plutarch"

- text: "Set your course by the stars, not by the lights of every passing ship."
  author: "Omar N. Bradley"

- text: "The purpose of education is to replace an empty mind with an open one."
  author: "Malcolm Forbes"

- text: "However beautiful the strategy, you should occasionally look at the results."
  author: "Winston Churchill"

- text: "When you have come to the edge of all that you know and are about to drop off into the darkness of the unknown, faith is knowing that one of two things will happen: that there will be something solid to stand on, or you'll be taught to fly."
  author: "Horus Lupercal"

- text: "I know that words cannot move mountains, but they can move the multitude. People are more ready to fight and die for a word than for anything else. Words shape thought, stir feeling, and force action."
  author: "Kyril Sindermann"

- text: "The good thing about computers is that they do what you tell them to do. The bad news is that they do what you tell them to do."
  author: "Ted Nelson"

- text: "To err is human, but to really foul things up you need a computer."
  author: "Paul R. Ehrlich"

- text: "The single biggest problem in communication is the illusion that it has taken place."
  author: "George Bernard Shaw"

- text: "The most exciting phrase to hear in science, the one that heralds new discoveries, is not 'Eureka!' but 'That's funny...'"
  author: "Isaac Asimov"

- text: "A strong economy begins with a strong, well-educated workforce."
  author: "Bill Owens"

- text: "People who cannot find time for recreation are sooner or later to find time for illness."
  author: "John Wanamaker"

- text: "A common mistake that people make when trying to design something completely foolproof is to underestimate the ingenuity of complete fools."
  author: "Douglas Adams"

- text: "The philosophers have only interpreted the world, in various ways. The point, however, is to change it."
  author: "Karl Marx"

- text: "The creation of a large quantity of disposable time apart from necessary labor time for society generally and each of its members (i.e., room for the full development of the individual), this and nothing else is the true realm of freedom."
  author: "Karl Marx"

- text: "NASA spent millions of dollars inventing the ball-point pen so they could write in space. The Russians took a pencil."
  author: "Will Chabot"

- text: "Throughout history, life forms have adapted themselves to fit their environments. Humanity is unique in that we adapt the environment to fit ourselves."
  author: "Buckminster Fuller (Abridged)"

- text: "Acts of men are better than acts of God."
  author: "Misato Katsuragi"

- text: "An ounce of action is worth a ton of theory."
  author: "Friedrich Engels"

- text: "If a machine is expected to be infallible, it cannot also be intelligent."
  author: "Alan Turing"

- text: "The original question, 'Can machines think?' I believe to be too meaningless to deserve discussion."
  author: "Alan Turing"

- text: "Talk is cheap. Show me the code."
  author: "Linus Torvalds"

- text: "Bad programmers worry about the code. Good programmers worry about data structures and their relationships."
  author: "Linus Torvalds"

- text: "I am not a visionary. I'm an engineer. I'm happy with the people who are wandering around looking at the stars but I am looking at the ground and I want to fix the pothole before I fall in."
  author: "Linus Torvalds"

- text: "Intelligence is the ability to avoid doing work, yet getting the work done."
  author: "Linus Torvalds"

- text: "Don't ever make the mistake [of thinking] that you can design something better than what you get from ruthless massively parallel trial-and-error with a feedback cycle. That's giving your intelligence much too much credit."
  author: "Linus Torvalds"

- text: "Regression testing? What's that? If it compiles, it is good; if it boots up, it is perfect."
  author: "Linus Torvalds"

- text: "The best way to get a project done faster is to start sooner."
  author: "Guido van Rossum"

- text: "C makes it easy to shoot yourself in the foot; C++ makes it harder, but when you do it blows your whole leg off."
  author: "Bjarne Stroustrup"

- text: "I have always wished for my computer to be as easy to use as my telephone; my wish has come true because I can no longer figure out how to use my telephone."
  author: "Bjarne Stroustrup"

- text: "Design and programming are human activities; forget that and all is lost."
  author: "Bjarne Stroustrup"

- text: "If the comment and code disagree, both are probably wrong."
  author: "Norm Schryer"

- text: "It's amazing how quickly people on the internet can pick something up, but it's also amazing how quickly they can drop it."
  author: "Tim Berners-Lee"

- text: "Data is a precious thing and will last longer than the systems themselves."
  author: "Tim Berners-Lee"

- text: "The amount of control you have over somebody if you can monitor internet activity is amazing."
  author: "Tim Berners-Lee"

- text: "There is a fine line between consideration and hesitation. The former is wisdom, the latter is fear."
  author: "Izaro Phrecius"

- text: "Accountability is the perfect counterweight to ambition."
  author: "Dominus, High Templar"

- text: "What can be found in a dream? A bigger dream."
  author: "Valdo Caeserius"

- text: "Trust people and they will be true to you; treat them greatly and they will show themselves to be great."
  author: "Ralph Waldo Emerson, Misattributed to David Brent"

- text: "Life is just a series of peaks and troughs, and you don't know whether you're in a trough until you're climbing out, or on a peak until you're coming down."
  author: "David Brent"

- text: "I never ask a man what his business is, for it never interests me. What I ask him about are his thoughts and dreams."
  author: "H.P. Lovecraft"

- text: "There is no such thing as a minor detail. Information is victory. One cannot and should not dismiss any data until one is in a position to evaluate its significance, and that only comes with hindsight."
  author: "Roboute Guilliman"

- text: "You won't get anything done by planning."
  author: "Karl Pilkington"

- text: "Does the brain control you or are you controlling the brain? I don't know if I'm in charge of mine."
  author: "Karl Pilkington"
